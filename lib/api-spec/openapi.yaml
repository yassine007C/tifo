openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tifo platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: servers
    description: Tifo server operations
  - name: participants
    description: Participant operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on success or failure.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /servers:
    get:
      operationId: listMyServers
      tags: [servers]
      summary: List Tifo servers the current user created or joined
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TifoServer"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createServer
      tags: [servers]
      summary: Create a new Tifo server by uploading a design image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TifoServerInput"
      responses:
        "201":
          description: Server created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TifoServer"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/join:
    post:
      operationId: joinServer
      tags: [servers]
      summary: Join a Tifo server using an access code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinServerRequest"
      responses:
        "200":
          description: Successfully joined — returns the server and your pixel assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinResult"
        "400":
          description: Invalid or expired access code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Server not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}:
    get:
      operationId: getServer
      tags: [servers]
      summary: Get a Tifo server by ID
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "200":
          description: Server details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TifoServer"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteServer
      tags: [servers]
      summary: Delete a Tifo server (creator only)
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}/activate:
    post:
      operationId: activateServer
      tags: [servers]
      summary: Activate the display (creator only) — all participants see their pixel color
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TifoServer"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}/deactivate:
    post:
      operationId: deactivateServer
      tags: [servers]
      summary: Deactivate the display (creator only)
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TifoServer"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}/status:
    get:
      operationId: getServerStatus
      tags: [servers]
      summary: Poll for server activation status and your pixel color
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "200":
          description: Current status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}/participants:
    get:
      operationId: listParticipants
      tags: [participants]
      summary: List all participants in a Tifo server with their positions
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "200":
          description: List of participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Participant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}/my-assignment:
    get:
      operationId: getMyAssignment
      tags: [participants]
      summary: Get the current user's pixel assignment in this server
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      responses:
        "200":
          description: Assignment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not in this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /servers/{serverId}/my-position:
    patch:
      operationId: updateMyPosition
      tags: [participants]
      summary: Manually choose your X/Y coordinates (if the spot is available)
      parameters:
        - $ref: "#/components/parameters/ServerIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PositionUpdate"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"
        "400":
          description: Invalid coordinates or spot already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not in this server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
    ServerIdParam:
      name: serverId
      in: path
      required: true
      schema:
        type: integer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    TifoServer:
      type: object
      required: [id, name, accessCode, width, height, totalPixels, isActive, creatorId, participantCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        accessCode:
          type: string
        width:
          type: integer
        height:
          type: integer
        totalPixels:
          type: integer
        isActive:
          type: boolean
        creatorId:
          type: string
        participantCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    TifoServerInput:
      type: object
      required: [name, imageData]
      properties:
        name:
          type: string
          minLength: 1
        imageData:
          type: string
          description: Base64-encoded image data (JPEG/PNG)
        targetWidth:
          type: integer
          description: Target pixel grid width (default 50)
          default: 50
        targetHeight:
          type: integer
          description: Target pixel grid height (default 30)
          default: 30

    JoinServerRequest:
      type: object
      required: [accessCode]
      properties:
        accessCode:
          type: string
          minLength: 1

    JoinResult:
      type: object
      required: [server, assignment]
      properties:
        server:
          $ref: "#/components/schemas/TifoServer"
        assignment:
          $ref: "#/components/schemas/Participant"

    Participant:
      type: object
      required: [id, serverId, userId, pixelNumber, x, y, color, displayName]
      properties:
        id:
          type: integer
        serverId:
          type: integer
        userId:
          type: string
        pixelNumber:
          type: integer
        x:
          type: integer
        y:
          type: integer
        color:
          type: string
          description: Hex color string (e.g. #ff0000)
        displayName:
          type: string

    PositionUpdate:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
        y:
          type: integer

    ServerStatus:
      type: object
      required: [serverId, isActive]
      properties:
        serverId:
          type: integer
        isActive:
          type: boolean
        myColor:
          type: ["string", "null"]
          description: The participant's pixel color if display is active
